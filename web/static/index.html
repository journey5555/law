<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법령 서비스</title>
  <link rel="stylesheet" href="/static/style.css?v=25" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-inner">
        <span class="header-icon">⚖</span>
        <h1>법령 서비스</h1>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="search">법령 검색</button>
      <button class="tab" data-tab="prec">판례 검색</button>
      <button class="tab" data-tab="unified">통합 검색</button>
      <button class="tab" data-tab="chat">법령 상담</button>
      <button class="tab" data-tab="lawprec">법률판례질의</button>
      <button class="tab" data-tab="scheduler">수집 관리</button>
      <button class="tab" data-tab="notifications">알림<span id="notifBadge" class="tab-badge" style="display:none"></span></button>
      <a href="/pharma" class="tab tab-external">💊 Pharma</a>
    </nav>

    <!-- 법령 검색 탭 -->
    <div id="tab-search" class="tab-panel active">
      <div class="search-section">
        <form id="searchForm" class="search-form">
          <input
            type="text"
            id="searchInput"
            placeholder="법령명을 입력하세요  (예: 근로기준법)"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" id="searchBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
        </form>
        <div class="search-type-toggle">
          <button class="search-type-btn active" data-search="1">법령명</button>
          <button class="search-type-btn" data-search="2">조문내용</button>
        </div>
        <div class="chips">
          <button class="chip" data-q="근로기준법">근로기준법</button>
          <button class="chip" data-q="자동차관리법">자동차관리법</button>
          <button class="chip" data-q="민법">민법</button>
          <button class="chip" data-q="형법">형법</button>
          <button class="chip" data-q="소득세법">소득세법</button>
        </div>
      </div>
      <div id="results" class="results"></div>
    </div>

    <!-- 판례 검색 탭 -->
    <div id="tab-prec" class="tab-panel">
      <div class="search-section">
        <form id="precForm" class="search-form">
          <input
            type="text"
            id="precInput"
            placeholder="키워드를 입력하세요  (예: 부당해고, 손해배상)"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" id="precBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
        </form>
        <div class="chips">
          <button class="chip prec-chip" data-q="부당해고">부당해고</button>
          <button class="chip prec-chip" data-q="손해배상">손해배상</button>
          <button class="chip prec-chip" data-q="계약해지">계약해지</button>
          <button class="chip prec-chip" data-q="명예훼손">명예훼손</button>
          <button class="chip prec-chip" data-q="임금체불">임금체불</button>
        </div>
      </div>
      <div id="precResults" class="results"></div>
    </div>

    <!-- 법령 상담 탭 -->
    <div id="tab-chat" class="tab-panel chat-panel">
      <div class="chat" id="chat" aria-live="polite">
        <div class="welcome" id="welcome">
          <p>조문·판례·법령 해석 등 궁금한 것을 물어보세요.</p>
          <div class="chips">
            <button class="chip chat-chip" data-msg="근로기준법 1조가 뭐야">근로기준법 1조</button>
            <button class="chip chat-chip" data-msg="연차 유급휴가 기준을 알려줘">연차 기준</button>
            <button class="chip chat-chip" data-msg="해고 예고 기간은 어떻게 되나요?">해고 예고</button>
          </div>
        </div>
      </div>
      <div class="composer">
        <form id="chatForm" class="composer-form">
          <textarea
            id="chatInput"
            rows="1"
            placeholder="질문을 입력하세요..."
            autocomplete="off"
          ></textarea>
          <button type="submit" id="chatBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </form>
        <p class="hint">Enter 전송 · Shift+Enter 줄바꿈</p>
      </div>
    </div>

    <!-- 법률판례질의 탭 -->
    <div id="tab-lawprec" class="tab-panel chat-panel">
      <div class="chat" id="lawprecChat" aria-live="polite">
        <div class="welcome" id="lawprecWelcome">
          <p>법률·판례 기반으로 구체적인 법적 질문에 답변합니다.</p>
          <div class="chips">
            <button class="chip lawprec-chip" data-msg="해고 예고 없이 즉시 해고된 경우 어떤 구제를 받을 수 있나요?">부당해고 구제</button>
            <button class="chip lawprec-chip" data-msg="임금 체불 시 형사처벌이 가능한가요?">임금 체불</button>
            <button class="chip lawprec-chip" data-msg="육아휴직 중 해고는 불법인가요?">육아휴직 해고</button>
          </div>
        </div>
      </div>
      <div class="composer">
        <form id="lawprecForm" class="composer-form">
          <textarea
            id="lawprecInput"
            rows="1"
            placeholder="법률·판례 관련 질문을 입력하세요..."
            autocomplete="off"
          ></textarea>
          <button type="submit" id="lawprecBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </form>
        <p class="hint">Enter 전송 · Shift+Enter 줄바꿈</p>
      </div>
    </div>

    <!-- 수집 관리 탭 -->
    <div id="tab-scheduler" class="tab-panel">
      <div class="scheduler-section">

        <!-- 법령 목록 -->
        <div class="scheduler-card">
          <div class="scheduler-card-header">
            <h2 class="scheduler-card-title">수집 대상 법령</h2>
            <div style="display:flex;gap:0.5rem">
              <button class="btn-secondary" id="presetLawBtn">추천 법령</button>
              <button class="btn-add" id="addLawBtn">+ 직접 추가</button>
            </div>
          </div>
          <div class="scheduler-table-wrap">
            <div id="lawList" class="law-list"></div>
          </div>
          <div id="lawPagination" class="pagination"></div>
        </div>

        <!-- 수집 이력 -->
        <div class="scheduler-card">
          <div class="scheduler-card-header">
            <h2 class="scheduler-card-title">수집 이력</h2>
            <button class="btn-secondary" id="refreshLogsBtn">새로고침</button>
          </div>
          <div id="logList" class="log-list">
            <div class="empty-msg">이력이 없습니다.</div>
          </div>
          <div id="logPagination" class="pagination"></div>
        </div>
      </div>
    </div>

    <!-- 통합 검색 탭 -->
    <div id="tab-unified" class="tab-panel">
      <div class="search-section">
        <form id="unifiedForm" class="search-form">
          <input type="text" id="unifiedInput" placeholder="법령명 또는 키워드를 입력하세요" autocomplete="off" spellcheck="false" />
          <button type="submit" id="unifiedBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </button>
        </form>
      </div>
      <div id="unifiedResults" class="unified-results"></div>
    </div>

    <!-- 알림 탭 -->
    <div id="tab-notifications" class="tab-panel">
      <div class="notif-section">
        <div class="notif-toolbar">
          <h2 class="scheduler-card-title">알림</h2>
          <div style="display:flex;gap:0.5rem">
            <button class="btn-secondary" id="markAllReadBtn">모두 읽음</button>
            <button class="btn-secondary btn-danger-soft" id="clearAllNotifsBtn">전체 삭제</button>
          </div>
        </div>
        <div id="notifSummary" class="notif-summary" style="display:none"></div>
        <div id="notifFilters" class="notif-filters" style="display:none"></div>
        <div id="notifList" class="notif-list">
          <div class="empty-msg" id="notifEmpty">알림이 없습니다.</div>
        </div>
      </div>
    </div>

  </div>

  <!-- 통합검색 전체화면 상세 페이지 -->
  <div id="detailPage" class="detail-page">
    <div class="detail-page-header">
      <button class="detail-page-back" id="detailPageBack">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        목록
      </button>
      <span class="detail-page-title" id="detailPageTitle"></span>
    </div>
    <div class="detail-page-body" id="detailPageBody"></div>
  </div>

  <!-- 추천 법령 모달 -->
  <div id="presetModal" class="modal-overlay" style="display:none">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>인사 관련 추천 법령</h3>
        <button class="modal-close" id="presetModalClose">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-hint">수집할 법령을 선택하세요. 이미 추가된 법령은 비활성화됩니다.</p>
        <div id="presetList" class="preset-list"></div>
        <div class="preset-schedule-row">
          <label class="modal-label">기본 수집 주기</label>
          <div class="preset-schedule-controls">
            <select id="presetInterval" class="modal-input preset-interval-select">
              <option value="daily">매일</option>
              <option value="weekly" selected>매주</option>
              <option value="monthly">매월</option>
            </select>
            <div id="presetWeekdayPicker" class="weekday-picker">
              <button type="button" class="weekday-btn active" data-day="월">월</button>
              <button type="button" class="weekday-btn" data-day="화">화</button>
              <button type="button" class="weekday-btn" data-day="수">수</button>
              <button type="button" class="weekday-btn" data-day="목">목</button>
              <button type="button" class="weekday-btn" data-day="금">금</button>
              <button type="button" class="weekday-btn" data-day="토">토</button>
              <button type="button" class="weekday-btn" data-day="일">일</button>
            </div>
            <select id="presetMonthdayPicker" class="modal-input" style="display:none"></select>
          </div>
        </div>
        <div class="preset-schedule-row">
          <label class="modal-label">실행 시각</label>
          <div class="time-picker-row">
            <select id="presetHour" class="modal-input time-select"></select>
            <span class="time-sep">:</span>
            <select id="presetMinute" class="modal-input time-select">
              <option value="00">00</option>
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="40">40</option>
              <option value="50">50</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span id="presetCount" class="preset-count-label"></span>
        <button class="btn-secondary" id="presetCancel">취소</button>
        <button class="btn-primary" id="presetAdd">선택 추가</button>
      </div>
    </div>
  </div>

  <!-- 법령 추가/편집 모달 -->
  <div id="lawModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">법령 추가</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">법령명</label>
        <div class="autocomplete-wrap">
          <input type="text" id="modalLawName" class="modal-input" placeholder="법령명 검색..." autocomplete="off" />
          <ul id="lawNameDropdown" class="autocomplete-dropdown" style="display:none"></ul>
        </div>
        <label class="modal-label">수집 대상</label>
        <select id="modalCollectType" class="modal-input">
          <option value="전체">법령 + 판례</option>
          <option value="법령">법령만</option>
          <option value="판례">판례만</option>
        </select>
        <label class="modal-label">수집 주기</label>
        <select id="modalInterval" class="modal-input">
          <option value="daily">매일</option>
          <option value="weekly" selected>매주</option>
          <option value="monthly">매월</option>
        </select>
        <div id="daySelector" style="display:none">
          <label class="modal-label" id="dayLabel">요일 선택</label>
          <div id="weekdayPicker" class="weekday-picker">
            <button type="button" class="weekday-btn" data-day="월">월</button>
            <button type="button" class="weekday-btn" data-day="화">화</button>
            <button type="button" class="weekday-btn" data-day="수">수</button>
            <button type="button" class="weekday-btn" data-day="목">목</button>
            <button type="button" class="weekday-btn" data-day="금">금</button>
            <button type="button" class="weekday-btn" data-day="토">토</button>
            <button type="button" class="weekday-btn" data-day="일">일</button>
          </div>
          <select id="monthdayPicker" class="modal-input" style="display:none"></select>
        </div>
        <label class="modal-label">실행 시각</label>
        <div class="time-picker-row">
          <select id="modalHour" class="modal-input time-select"></select>
          <span class="time-sep">:</span>
          <select id="modalMinute" class="modal-input time-select">
            <option value="00">00</option>
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
            <option value="50">50</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modalCancel">취소</button>
        <button class="btn-primary" id="modalSave">저장</button>
      </div>
    </div>
  </div>

  <!-- 조문 슬라이드 패널 -->
  <div id="articlePanel" class="article-panel">
    <div class="panel-inner">
      <div class="panel-header">
        <div class="panel-title-wrap">
          <span id="panelLawName" class="panel-law-name"></span>
          <span id="panelJoTitle" class="panel-jo-title"></span>
        </div>
        <button id="panelClose" class="panel-close" aria-label="닫기">✕</button>
      </div>
      <div id="panelContent" class="panel-content">
        <div class="state-msg"><span class="spinner"></span>불러오는 중...</div>
      </div>
    </div>
  </div>

  <script src="/static/chat.js?v=21"></script>
</body>
</html>
